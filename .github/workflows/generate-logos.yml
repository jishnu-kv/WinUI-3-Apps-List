name: Generate Apps Logo YAML

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run parser script
        run: python extract_logos.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add apps_logo.yml README.md
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Auto-generate apps_logo.yml and clean logo comments from README.md"
            git push
          fi
